name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Verify embedded contract is in sync (Unix only)
        if: matrix.os != 'windows-latest'
        run: |
          diff -q sparks-contracts.md internal/contract/contract.md \
            || (echo "::error::contract drift! run: make sync-contract"; exit 1)

      - name: Vet
        shell: bash
        run: go vet ./...

      - name: Test
        shell: bash
        run: go test -race -coverprofile=cover.out ./...

      - name: Coverage
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: go tool cover -func=cover.out | tail -1

      - name: Build
        shell: bash
        run: go build -o sparks ./cmd/sparks
