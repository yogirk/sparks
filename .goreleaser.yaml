# goreleaser config for Sparks. Run `goreleaser release --snapshot --clean`
# locally to test; CI invokes it on tag push (see .github/workflows/release.yml).
version: 2

project_name: sparks

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: sparks
    main: ./cmd/sparks
    binary: sparks
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - sparks-spec.md
      - sparks-contracts.md
      - sparks-insight.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  github:
    owner: yogirk
    name: sparks
  draft: false
  prerelease: auto
  header: |
    ## Sparks {{ .Tag }} — pre-alpha

    Knowledge base runtime for AI agents — a single Go binary that any harness can drive.

    **Heads up:** this is the first release. The internals are tested but the end-to-end agent-driven workflow has only been dogfooded on the maintainer's vault. Expect rough edges. Please [open an issue](https://github.com/yogirk/sparks/issues) when you find them — that's the fastest way to harden v0.x.

    Install:

    ```bash
    # Homebrew
    brew install yogirk/tap/sparks

    # Go install
    go install github.com/yogirk/sparks/cmd/sparks@{{ .Tag }}
    ```

    Or grab a pre-built binary below (darwin / linux / windows × amd64 / arm64).

brews:
  - repository:
      owner: yogirk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: yogirk
      email: ranjeeth.kuppala@gmail.com
    homepage: "https://github.com/yogirk/sparks"
    description: "Knowledge base runtime for AI agents — a single Go binary that any harness can drive"
    license: MIT
    install: |
      bin.install "sparks"
    test: |
      system "#{bin}/sparks", "--version"
